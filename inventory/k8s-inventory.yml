all:
  hosts:
    k8s-master:
      ansible_host: 192.168.64.189
      ansible_port: 22
      ansible_connection: ssh
      ansible_python_interpreter: /usr/bin/python3
      ansible_user: cloud-user
    k8s-worker1:
      ansible_host: 192.168.64.163
      ansible_port: 22
      ansible_connection: ssh
      ansible_python_interpreter: /usr/bin/python3
      ansible_user: cloud-user
    k8s-worker2:
      ansible_host: 192.168.64.30
      ansible_port: 22
      ansible_connection: ssh
      ansible_python_interpreter: /usr/bin/python3
      ansible_user: cloud-user
  vars:
    ansible_ssh_common_args: '-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no'
    ansible_become: true
    ansible_become_method: sudo

  children:
    master:
      hosts:
        k8s-master:
    worker:
      hosts:
        k8s-worker1:
        k8s-worker2:

