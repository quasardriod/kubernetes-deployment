- name: Run playbook cni-provider
  hosts: all:!worker
  gather_facts: true

  pre_tasks:
  - name: Set CNI profile from deployment capabilities
    ansible.builtin.set_fact:
      cni_profile: >-
        {{
          (
            kubeadm_deployment_capablities.cni
            | dict2items
            | selectattr('value.deploy', 'defined')
            | selectattr('value.deploy')
            | map(attribute='key')
            | list
            | first
          )
          | default('')
        }}

  - name: Set CNI provider from selected profile
    ansible.builtin.set_fact:
      cni_provider: "{{ cni_profile }}"
    when: cni_profile | length > 0

  - name: Debug CNI provider
    ansible.builtin.debug:
      msg: "Selected CNI provider: {{ cni_provider }}"

  - name: Fail if no CNI provider is selected
    ansible.builtin.fail:
      msg: "No CNI provider selected. Please check kubeadm_deployment_capablities.cni in group_vars/all.yml"
    when: cni_provider | length == 0
  
  tasks:
  - name: Install Calico
    ansible.builtin.include_role:
      name: cni/calico
      tasks_from: main.yml
    when: cni_provider == 'calico'
    tags:
    - calico

  - name: Install Calicoctl
    ansible.builtin.include_role:
      name: cni/calico
      tasks_from: calicoctl.yml
    when: cni_provider == 'calico'
    tags:
    - calicoctl
    - calico
