---

- name: Add {{ ansible_user }} in group docker
  ansible.builtin.user:
    name: '{{ ansible_user }}'
    groups: docker
    append: yes

- name: Activate group
  ansible.builtin.shell: newgrp docker &

- name: Make sure docker and containerd are running
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  with_items:
    - docker
    - containerd

- name: Get stat of /usr/local/bin/minikube
  ansible.builtin.stat:
    path: /usr/local/bin/minikube
  register: _mkube_file

- name: Download minikube
  ansible.builtin.get_url:
    url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    dest: /usr/local/bin/minikube
    mode: '0755'
  when: not _mkube_file.stat.exists

- name: Check minikube version
  ansible.builtin.shell: /usr/local/bin/minikube version
  register: _mkube_version

- ansible.builtin.debug:
    var: _mkube_version.stdout_lines

# Do not run minikube as root
- name: Install minikube
  ansible.builtin.command: /usr/local/bin/minikube start --driver=docker --force
  register: _mkube_start
  become: false

- name: Print minikube start output
  ansible.builtin.debug:
    var: _mkube_start.stdout_lines